<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pawsthma Insights Light</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#fb7e51", 
                        "primary-light": "#fff1eb", 
                        "mint": "#e6f5f0",
                        "mint-dark": "#34d399",
                        "yellow": "#fffbeb",
                        "yellow-dark": "#fcd34d",
                        "text-main": "#1e293b",
                        "text-sub": "#64748b",
                        "background": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                    },
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(844px, 100dvh);
            -webkit-font-smoothing: antialiased;
        }.donut-segment {
            transition: stroke-dasharray 0.5s ease;
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(251, 126, 81, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-50 font-display text-text-main">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto bg-white shadow-2xl overflow-hidden">
<header class="px-6 pt-12 pb-4 bg-white sticky top-0 z-20">
<div class="flex justify-between items-center mb-6">
<div>
<h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Health Insights</h1>
<p class="text-text-sub font-medium text-sm mt-1">Last 30 Days Summary</p>
</div>
<button class="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined text-slate-600">calendar_month</span>
</button>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="bg-primary-light p-3 rounded-2xl flex flex-col items-center justify-center gap-1 min-h-[100px]">
<span class="material-symbols-outlined text-primary text-2xl mb-1">priority_high</span>
<span class="text-2xl font-extrabold text-slate-800">12</span>
<span class="text-[10px] font-bold uppercase tracking-wide text-primary/80">Attacks</span>
</div>
<div class="bg-mint p-3 rounded-2xl flex flex-col items-center justify-center gap-1 min-h-[100px]">
<span class="material-symbols-outlined text-mint-dark text-2xl mb-1">check_circle</span>
<span class="text-2xl font-extrabold text-slate-800">98%</span>
<span class="text-[10px] font-bold uppercase tracking-wide text-mint-dark/80">Adherence</span>
</div>
<div class="bg-yellow p-3 rounded-2xl flex flex-col items-center justify-center gap-1 min-h-[100px]">
<span class="material-symbols-outlined text-yellow-dark text-2xl mb-1">trending_down</span>
<span class="text-2xl font-extrabold text-slate-800">-15%</span>
<span class="text-[10px] font-bold uppercase tracking-wide text-yellow-dark/80">Trend</span>
</div>
</div>
</header>
<div class="flex-1 overflow-y-auto px-6 pb-24 space-y-8">
<div class="pt-2">
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold text-slate-800">Attack Frequency</h3>
<div class="flex gap-1 bg-slate-100 p-1 rounded-lg">
<button class="px-3 py-1 bg-white text-xs font-bold rounded shadow-sm text-slate-800">W</button>
<button class="px-3 py-1 text-slate-400 text-xs font-bold hover:text-slate-600">M</button>
<button class="px-3 py-1 text-slate-400 text-xs font-bold hover:text-slate-600">Y</button>
</div>
</div>
<div class="relative h-48 w-full">
<div class="absolute inset-0 flex flex-col justify-between text-xs text-slate-300 pointer-events-none">
<div class="border-b border-dashed border-slate-100 w-full h-0"></div>
<div class="border-b border-dashed border-slate-100 w-full h-0"></div>
<div class="border-b border-dashed border-slate-100 w-full h-0"></div>
<div class="border-b border-dashed border-slate-100 w-full h-0"></div>
<div class="border-b border-slate-200 w-full h-0"></div>
</div>
<svg class="absolute inset-0 h-full w-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 50">
<defs>
<linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#fb7e51" stop-opacity="0.2"></stop>
<stop offset="100%" stop-color="#fb7e51" stop-opacity="0"></stop>
</linearGradient>
</defs>
<path d="M0,40 Q10,35 20,25 T40,20 T60,30 T80,10 T100,25 V50 H0 Z" fill="url(#gradient)"></path>
<path d="M0,40 Q10,35 20,25 T40,20 T60,30 T80,10 T100,25" fill="none" stroke="#fb7e51" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<circle cx="20" cy="25" fill="white" r="2" stroke="#fb7e51" stroke-width="1.5"></circle>
<circle cx="40" cy="20" fill="white" r="2" stroke="#fb7e51" stroke-width="1.5"></circle>
<circle cx="60" cy="30" fill="white" r="2" stroke="#fb7e51" stroke-width="1.5"></circle>
<circle cx="80" cy="10" fill="white" r="2" stroke="#fb7e51" stroke-width="1.5"></circle>
</svg>
<div class="absolute bottom-[-24px] w-full flex justify-between text-[10px] text-slate-400 font-medium px-1">
<span>Mon</span>
<span>Tue</span>
<span>Wed</span>
<span>Thu</span>
<span>Fri</span>
<span>Sat</span>
<span>Sun</span>
</div>
</div>
</div>
<div class="h-2"></div>
<div class="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
<h3 class="text-lg font-bold text-slate-800 mb-6">Severity Breakdown</h3>
<div class="flex items-center gap-8">
<div class="relative w-32 h-32 flex-shrink-0">
<svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
<path class="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="4.5"></path>
<path class="text-red-400" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="15, 100" stroke-width="4.5"></path>
<path class="text-orange-300" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="30, 100" stroke-dashoffset="-15" stroke-width="4.5"></path>
<path class="text-primary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="55, 100" stroke-dashoffset="-45" stroke-width="4.5"></path>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-2xl font-extrabold text-slate-800">12</span>
<span class="text-[10px] text-slate-400 font-bold uppercase">Total</span>
</div>
</div>
<div class="flex flex-col gap-3 w-full">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
<span class="text-sm font-semibold text-slate-600">Mild</span>
</div>
<span class="text-sm font-bold text-slate-800">55%</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-orange-300"></div>
<span class="text-sm font-semibold text-slate-600">Moderate</span>
</div>
<span class="text-sm font-bold text-slate-800">30%</span>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
<span class="text-sm font-semibold text-slate-600">Severe</span>
</div>
<span class="text-sm font-bold text-slate-800">15%</span>
</div>
</div>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold text-slate-800">Top Triggers</h3>
<a class="text-primary text-sm font-bold" href="#">View all</a>
</div>
<div class="space-y-3">
<div class="flex items-center p-3 bg-white border border-slate-100 rounded-xl shadow-sm">
<div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mr-3">
<span class="material-symbols-outlined">air</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-slate-800 text-sm">Dust</h4>
<div class="w-full bg-slate-100 rounded-full h-1.5 mt-2">
<div class="bg-blue-400 h-1.5 rounded-full" style="width: 70%"></div>
</div>
</div>
<span class="ml-3 font-bold text-slate-600 text-sm">High</span>
</div>
<div class="flex items-center p-3 bg-white border border-slate-100 rounded-xl shadow-sm">
<div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center mr-3">
<span class="material-symbols-outlined">grass</span>
</div>
<div class="flex-1">
<h4 class="font-bold text-slate-800 text-sm">Pollen</h4>
<div class="w-full bg-slate-100 rounded-full h-1.5 mt-2">
<div class="bg-green-400 h-1.5 rounded-full" style="width: 45%"></div>
</div>
</div>
<span class="ml-3 font-bold text-slate-600 text-sm">Med</span>
</div>
</div>
</div>
</div>
<nav class="absolute bottom-0 w-full bg-white border-t border-slate-100 pb-8 pt-2 px-6">
<div class="flex justify-between items-center">
<button class="flex flex-col items-center gap-1 text-slate-400 w-16">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-bold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary w-16">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">bar_chart</span>
<span class="text-[10px] font-bold">Insights</span>
</button>
<div class="relative -top-6">
<button class="w-14 h-14 bg-slate-900 rounded-full shadow-lg shadow-slate-900/30 flex items-center justify-center text-white transform hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<button class="flex flex-col items-center gap-1 text-slate-400 w-16">
<span class="material-symbols-outlined text-2xl">medication</span>
<span class="text-[10px] font-bold">Meds</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 w-16">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="text-[10px] font-bold">More</span>
</button>
</div>
</nav>
</div>

</body></html>
