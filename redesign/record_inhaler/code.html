<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log Inhaler Modal Light</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4BC2A5", // Mint color as requested
                        "primary-dark": "#3CA88E",
                        "background-light": "#ffffff",
                        "background-offset": "#f4f7f6",
                        "text-main": "#1e293b",
                        "text-sub": "#64748b",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-offset font-display text-text-main min-h-screen">
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-white">
<div class="absolute inset-0 z-0 p-6 flex flex-col gap-6 opacity-30 pointer-events-none">
<div class="flex justify-between items-center">
<div>
<p class="text-sm text-primary font-bold uppercase tracking-wider">Good Afternoon</p>
<h2 class="text-3xl font-extrabold text-slate-900">Luna</h2>
</div>
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary/30 shadow-sm">
<img alt="Cat profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgmzCnoRpRDspXd4VUWvwRLazrUd9-Jnxx8KOjjpJcAA4rhrnfkayg92mPXQKwVguiS4LBcBYV0j4PosXj7fbi9sL5GBclZUFWdd0WQWUXHcmLktWxEGVkn0R-BDS7XRAfNUIEYBsIhDN9OWE1tvwwBhof1HV3Lzal_GDoGHK5AE_89Rh_FimeINc_kgxub-TbyejzRVSlWWbI1Nd6BVmZg4SJzqZB6Jb5sl0rmByAJjpvANrbvqcyeZ66jux9D0KxCa2jmEZAt8k"/>
</div>
</div>
<div class="bg-primary/10 border border-primary/20 rounded-xl p-6">
<p class="text-sm font-semibold text-primary-dark opacity-80">Next Dose</p>
<h3 class="text-xl font-bold text-slate-800">4:00 PM · Inhaler</h3>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-slate-100 p-4 rounded-xl h-32 border border-slate-200"></div>
<div class="bg-slate-100 p-4 rounded-xl h-32 border border-slate-200"></div>
</div>
<div class="bg-slate-100 p-4 rounded-xl h-48 border border-slate-200"></div>
</div>
<div class="absolute inset-0 z-10 flex flex-col justify-end bg-slate-900/40 backdrop-blur-sm">
<div class="flex flex-col bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] max-h-[92vh] w-full">
<div class="flex h-8 w-full items-center justify-center pt-2 pb-1">
<div class="h-1.5 w-12 rounded-full bg-slate-200"></div>
</div>
<div class="px-6 pb-10 overflow-y-auto">
<div class="flex items-center justify-between mb-8 mt-2">
<h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Log Inhaler</h1>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="bg-blue-50/50 border border-blue-100 p-4 rounded-2xl flex items-center gap-4 mb-8">
<div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">medication</span>
</div>
<div>
<p class="text-xs font-bold text-blue-400 uppercase tracking-wide">Medication</p>
<p class="text-lg font-bold text-slate-800">Fluticasone (Flovent)</p>
</div>
</div>
<div class="space-y-4 mb-10">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">air</span>
<h3 class="text-lg font-bold text-slate-800">Breaths Taken</h3>
</div>
<span class="text-3xl font-extrabold text-primary">7</span>
</div>

<div class="relative w-full h-24 flex items-center">
<div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-white to-transparent z-10 pointer-events-none"></div>
<div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>
<div class="flex overflow-x-auto gap-4 py-4 px-4 w-full no-scrollbar snap-x snap-mandatory">
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">1</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">2</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">3</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">4</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">5</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">6</button>
<button class="shrink-0 snap-center w-16 h-16 rounded-full flex items-center justify-center text-2xl font-extrabold text-white bg-primary shadow-lg shadow-primary/40 transform scale-110 ring-4 ring-primary/10">7</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">8</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">9</button>
<button class="shrink-0 snap-center w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-slate-400 bg-slate-50 border border-slate-100 hover:border-primary/30 transition-all">10</button>
</div>
</div>
</div>
<div class="space-y-4 mb-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">edit_note</span>
<h3 class="text-lg font-bold text-slate-800">Notes (Optional)</h3>
</div>
<div class="relative">
<textarea class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-700 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary min-h-[100px] resize-none transition-shadow" placeholder="Any coughing or wheezing during administration?"></textarea>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary-dark text-white font-extrabold text-lg py-5 rounded-2xl shadow-[0_8px_20px_rgba(75,194,165,0.4)] flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">check</span>
                        Save Log
                    </button>
<div class="h-6"></div>
</div>
</div>
</div>
</div>
