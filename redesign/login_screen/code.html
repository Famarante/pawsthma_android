<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pawsthma Login Light</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF7E67","secondary": "#FFB74D","text-main": "#2D3748",
                        "text-muted": "#718096",
                        "input-border": "#E2E8F0",
                        "input-bg": "#F7FAFC",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "2xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'button': '0 10px 20px -5px rgba(255, 126, 103, 0.4)'
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(600px, 100dvh);background: linear-gradient(180deg, #FFFFFF 0%, #FFF5F2 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display text-text-main h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-sm flex flex-col items-center gap-8 animate-fade-in-up">
<div class="flex flex-col items-center gap-4">
<div class="w-24 h-24 bg-white rounded-full shadow-soft flex items-center justify-center relative overflow-hidden p-4 border border-orange-50">
<div class="absolute inset-0 bg-primary/5 rounded-full"></div>
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1">pets</span>
</div>
<div class="text-center space-y-1">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-800">Pawsthma</h1>
<p class="text-text-muted font-medium">Breathe easy, little friend.</p>
</div>
</div>
<form class="w-full space-y-5" onsubmit="event.preventDefault();">
<div class="space-y-1.5">
<label class="block text-sm font-bold text-slate-700 ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-white border border-input-border rounded-xl text-slate-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm text-base font-medium" id="email" placeholder="hello@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-bold text-slate-700 ml-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-white border border-input-border rounded-xl text-slate-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm text-base font-medium" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-xs font-bold text-slate-400 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-[#FF6B52] text-white font-bold py-4 rounded-xl shadow-button flex items-center justify-center gap-2 transition-all active:scale-[0.98]" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</form>
<div class="w-full flex items-center gap-4">
<div class="h-px bg-slate-200 flex-1"></div>
<span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Or</span>
<div class="h-px bg-slate-200 flex-1"></div>
</div>
<div class="text-center">
<p class="text-slate-500 font-medium">Don't have an account?</p>
<button class="mt-2 text-secondary font-extrabold text-lg hover:underline decoration-2 underline-offset-4 decoration-secondary/30 transition-all">
                Create Account
            </button>
</div>
</div>
<div class="fixed bottom-6 left-0 right-0 flex justify-center opacity-30 pointer-events-none">
<div class="w-32 h-1 bg-slate-300 rounded-full"></div>
</div>

</body></html>
